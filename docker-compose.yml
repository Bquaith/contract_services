services:
  postgres:
    image: postgres:16-alpine
    container_name: data-contracts-postgres
    environment:
      POSTGRES_DB: data_contracts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_contracts"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./.pgdata:/var/lib/postgresql/data

  service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-contracts-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/data_contracts
      API_KEY: dev-api-key
      DATA_CONTRACTS_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    restart: unless-stopped
